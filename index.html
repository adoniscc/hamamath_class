<!doctype html>

  <style>
    :root{--ink:#20242b;--muted:#6b7280;--line:#e5e7eb;--page:#f7f8fb;--orange:#ff7417;--soft:#fff0e7;--green:#159a74;--blue:#2864d8;--red:#d94343;--yellow:#946400;--shadow:0 14px 34px rgba(20,24,32,.08);font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif}*{box-sizing:border-box}body{margin:0;background:var(--page);color:var(--ink)}button,input,textarea,select{font:inherit}button{cursor:pointer;border:0}.login{position:fixed;inset:0;z-index:10;display:grid;place-items:center;padding:18px;background:linear-gradient(135deg,#fff7f1,#eef8f4 55%,#f7f8fb)}.login-card{width:min(760px,100%);display:grid;grid-template-columns:250px 1fr;gap:24px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:26px;box-shadow:0 28px 80px rgba(20,24,32,.18)}.login-card img{width:100%;object-fit:contain}.login-card h1{margin:0;font-size:26px}.muted{color:var(--muted)}.role-row,.actions{display:flex;gap:8px;flex-wrap:wrap}.role-btn,.ghost,.primary,.nav button{height:40px;border-radius:8px;font-weight:800}.role-btn{flex:1;border:1px solid var(--line);background:#fff;color:var(--muted)}.role-btn.active,.nav button.active{background:var(--soft);border-color:var(--orange);color:#b54800}.primary{background:var(--orange);color:#fff;padding:0 14px}.ghost{background:#fff;border:1px solid var(--line);padding:0 12px}.login input{width:100%;height:42px;border:1px solid var(--line);border-radius:8px;padding:0 12px}.app{min-height:100vh}.top{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:13px 22px;background:rgba(255,255,255,.96);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}.brand{display:flex;align-items:center;gap:14px}.brand img{width:170px;height:50px;object-fit:contain}.brand h1{margin:0;font-size:20px}.main{display:grid;grid-template-columns:250px minmax(0,1fr);gap:18px;max-width:1580px;margin:0 auto;padding:18px}.panel,.card{background:#fff;border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow)}.side{position:sticky;top:92px;align-self:start;padding:14px}.userbox{padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfcff}.nav{display:grid;gap:8px;margin-top:12px}.nav button{display:flex;align-items:center;justify-content:space-between;background:transparent;border:1px solid transparent;color:var(--muted);padding:0 12px}.view{display:none}.view.active{display:block}.grid{display:grid;gap:12px}.metrics{grid-template-columns:repeat(5,minmax(0,1fr));margin-bottom:16px}.metric{padding:16px}.metric b{display:block;font-size:30px;margin-top:7px}.two{grid-template-columns:1fr 1fr}.student-layout{grid-template-columns:360px minmax(0,1fr)}.head{padding:16px;border-bottom:1px solid var(--line)}.body{padding:16px}.search{width:100%;height:40px;border:1px solid var(--line);border-radius:8px;padding:0 12px}.chips,.name-list{display:flex;gap:7px;flex-wrap:wrap}.chip,.pill,.badge{display:inline-flex;align-items:center;min-height:28px;border-radius:8px;padding:4px 9px;font-size:12px;font-weight:900}.chip{border:1px solid var(--line);background:#fff;color:var(--muted)}.chip.active{background:var(--soft);border-color:var(--orange);color:#b54800}.student-list{max-height:660px;overflow:auto;padding:10px}.student{width:100%;display:grid;grid-template-columns:1fr auto;gap:8px;text-align:left;background:#fff;border:1px solid transparent;border-radius:8px;padding:11px}.student.active{background:var(--soft);border-color:var(--orange)}.small{font-size:12px;color:var(--muted);line-height:1.4}.badge.green{background:#e8f7f1;color:#087557}.badge.blue{background:#eaf1ff;color:#174ca8}.badge.red{background:#fff0f0;color:#ac2424}.badge.yellow{background:#fff7db;color:#946400}.badge.orange{background:var(--soft);color:#b54800}.detail-title{padding:20px;background:linear-gradient(90deg,rgba(255,116,23,.11),rgba(21,154,116,.08));border-bottom:1px solid var(--line)}.detail-title h2{margin:0;font-size:30px}.fields{grid-template-columns:repeat(2,minmax(0,1fr))}.field{display:grid;gap:6px;padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfcff}.field label,.label{font-size:12px;color:var(--muted);font-weight:800}.field input,.field textarea,.field select{width:100%;border:1px solid var(--line);border-radius:8px;padding:9px;background:#fff}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:8px;background:#fff}.rows{display:grid;gap:8px}.report-output{white-space:pre-wrap;line-height:1.6}.audit{display:grid;grid-template-columns:150px 110px 1fr;gap:10px;padding:11px;border:1px solid var(--line);border-radius:8px}.modal{position:fixed;inset:0;z-index:20;display:none;place-items:center;background:rgba(12,18,28,.48);padding:18px}.modal.open{display:grid}.modal-inner{width:min(720px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:8px}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}.full{grid-column:1/-1}@media(max-width:1100px){.main,.student-layout,.two{grid-template-columns:1fr}.side{position:relative;top:auto}.metrics{grid-template-columns:repeat(2,1fr)}}@media(max-width:720px){.login-card,.fields,.form,.metrics{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.brand img{width:115px}.main{padding:10px}.audit{grid-template-columns:1fr}.row{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <section class="login" id="login"><div class="login-card"><img src="assets/eokmaebang-logo.svg" alt="억매방 로고"><div class="grid"><h1>억매방 관리센터</h1><div class="muted">초등 영어 학습 관리 사이트입니다.</div><div class="role-row"><button class="role-btn active" data-role="director">원장 페이지</button><button class="role-btn" data-role="teacher">강사 페이지</button></div><input id="password" type="password" placeholder="비밀번호 입력"><button class="primary" id="loginBtn">접속하기</button><div class="small">기본 비밀번호: 원장 1234 · 강사 1111</div><div class="small" id="loginError" style="color:#d94343"></div></div></div></section>
  <div class="app"><header class="top"><div class="brand"><img src="assets/eokmaebang-logo.svg" alt="억매방 로고"><div><h1>억매방 관리센터</h1><div class="small">학생 관리 · 출결 관리 · 영어 학습 관리 · AI 학습보고서</div></div></div><div class="actions"><button class="ghost" id="exportBtn">자료 내보내기</button><button class="primary" id="openAddBtn">+ 학생 등록</button></div></header><main class="main"><aside class="panel side"><div class="userbox"><b id="roleText">접속 대기</b><div class="small" id="roleMeta">로그인 후 이용</div></div><nav class="nav" id="nav"><button class="active" data-view="dashboard">대시보드 <span>›</span></button><button data-view="students">학생명부 <span>›</span></button><button data-view="grades">학년별 명단 <span>›</span></button><button data-view="days">요일별 명단 <span>›</span></button><button data-view="detail">학생 상세 <span>›</span></button><button data-view="audit">수정 기록 <span>›</span></button></nav><button class="ghost" id="logoutBtn" style="width:100%;margin-top:12px">로그아웃</button></aside><section><section class="view active" id="dashboard"><div class="grid metrics" id="metrics"></div></section><section class="view" id="students"><div class="panel student-layout grid"><div><div class="head"><h2>학생명부</h2><p class="small" id="countText"></p><input class="search" id="search" placeholder="이름, 학교, 학습 영역 검색"></div><div class="body"><div class="chips" id="chips"></div></div><div class="student-list" id="studentList"></div></div><div class="panel" id="quickDetail"></div></div></section><section class="view" id="grades"><div class="panel"><div class="head"><h2>학년별 명단</h2></div><div class="body rows" id="gradeList"></div></div></section><section class="view" id="days"><div class="panel"><div class="head"><h2>요일별 등원 학생 명단</h2></div><div class="body rows" id="dayList"></div></div></section><section class="view" id="detail"><div class="panel" id="detailPanel"></div></section><section class="view" id="audit"><div class="panel"><div class="head"><h2>수정 기록</h2><p class="small" id="auditCount"></p></div><div class="body rows" id="auditList"></div></div></section></section></main></div>
  <div class="modal" id="addModal"><div class="modal-inner"><div class="head"><h2>학생 등록</h2></div><div class="form"><div class="field"><label>이름</label><input id="newName"></div><div class="field"><label>학년</label><select id="newGrade"></select></div><div class="field"><label>학교</label><input id="newSchool"></div><div class="field"><label>수강 과목</label><input id="newSubject" value="영어"></div><div class="field"><label>요일</label><input id="newDays"></div><div class="field"><label>교재</label><input id="newBook"></div><div class="field"><label>진도</label><input id="newProgress"></div><div class="field"><label>학생 연락처</label><input id="newStudentPhone"></div><div class="field"><label>학부모 연락처</label><input id="newParentPhone"></div><div class="field full"><label>상담 메모</label><textarea id="newMemo"></textarea></div><div class="actions full"><button class="ghost" id="closeAddBtn">취소</button><button class="primary" id="addStudentBtn">등록</button></div></div></div></div>
  <script>
    const academy="억매방", grades=["초등 1학년","초등 2학년","초등 3학년","초등 4학년","초등 5학년","초등 6학년"], names={"초등 1학년":["김도윤","이서아","박지후","최하윤","정민재"],"초등 2학년":["강시우","윤아린","한지민","오준서","임서윤"],"초등 3학년":["문태오","신유나","배현우","조예린","안지호"],"초등 4학년":["서하준","권나은","홍민서","유건우","장서율"],"초등 5학년":["남지안","류도현","백예준","송채원","차은우"],"초등 6학년":["전하린","고시온","양준우","민가온","노유찬"]};
    const days=["월","화","수","목","금","토"], statuses=["출석","지각","결석"], tasks=["완료","일부 완료","미제출"], reports={growth:"성장 스토리",weekly:"주간 체크",classic:"클래식 리포트"}, storeKey="eokmaebang-data-v1";let selectedRole="director",user=null,view="dashboard",filter="전체",q="";
    let state=load();let selectedId=state.selectedId||state.students[0]?.id;const $=s=>document.querySelector(s),$$=s=>[...document.querySelectorAll(s)],student=()=>state.students.find(s=>s.id===selectedId)||state.students[0];
    function seed(){let i=1;return Object.entries(names).flatMap(([grade,list],gi)=>list.map((name,ni)=>{const n=gi*5+ni;return{id:`S${String(i++).padStart(3,"0")}`,name,grade,school:["새싹초","하늘초","푸른초","나래초","우리초"][n%5],subject:"영어",days:["월·수","화·목","월·수·금","화·목·토","토"][n%5],studentPhone:`010-${2100+n}-${4300+n}`,parentPhone:`010-${7200+n}-${1300+n}`,book:["파닉스 리더스","초등 영단어","Reading Starter","Listening Up","Speaking Time"][n%5],unit:["파닉스 장모음","기초 단어 3과","리딩 Unit 4","리스닝 Unit 2","스피킹 Role-play"][n%5],makeupDate:n%7==0?"2026-07-22":"",attendance:Array.from({length:8},(_,x)=>({date:`7/${String(x+1).padStart(2,"0")}`,lesson:x%2?"영어 클리닉":"정규 영어",status:statuses[(n+x)%3]})).reverse(),english:{vocab:70+(n%6)*5,reading:68+(n%5)*6,listening:72+(n%4)*5,speaking:65+(n%7)*4},assignments:[{title:"단어 암기",due:"7/08",status:tasks[n%3],note:"20개"},{title:"리딩 워크북",due:"7/10",status:tasks[(n+1)%3],note:"Unit 풀이"}],memo:`${name} 학부모 상담 메모\n- 단어 암기 흐름 확인\n- 리딩 소리내어 읽기 권장`}}))}
    function load(){try{const saved=JSON.parse(localStorage.getItem(storeKey));if(saved?.students)return{...saved,audit:saved.audit||[]}}catch{}return{students:seed(),audit:[],selectedId:null}}function save(){state.selectedId=selectedId;localStorage.setItem(storeKey,JSON.stringify(state))}function audit(st,field,before,after){if(String(before??"")==String(after??""))return;state.audit.unshift({at:new Date().toISOString(),actor:user?.label||"미로그인",student:st?.name||"전체",field,before:String(before??""),after:String(after??"")});state.audit=state.audit.slice(0,300);save();renderAudit()}function badge(v){return v=="출석"||v=="완료"?"green":v=="지각"||v=="일부 완료"?"yellow":"red"}function ar(s){return Math.round(s.attendance.filter(a=>a.status!="결석").length/s.attendance.length*100)}function tr(s){return Math.round(s.assignments.filter(a=>a.status=="완료").length/s.assignments.length*100)}function avg(s){return Math.round((+s.english.vocab + +s.english.reading + +s.english.listening + +s.english.speaking)/4)}function action(s){if(s.assignments.some(a=>a.status=="미제출"))return"과제 확인";if(s.attendance.some(a=>a.status=="결석"))return"보강 확인";if(avg(s)<75)return"학습 상담";return"정상 관리"}
    function show(id){view=id;$$('.view').forEach(v=>v.classList.toggle('active',v.id==id));$$('#nav button').forEach(b=>b.classList.toggle('active',b.dataset.view==id))}function render(){renderMetrics();renderChips();renderStudents();renderRosters();renderDetail();renderAudit();save()}function renderMetrics(){const abs=state.students.filter(s=>s.attendance[0]?.status=="결석").length,miss=state.students.filter(s=>s.assignments.some(a=>a.status=="미제출")).length,low=state.students.filter(s=>avg(s)<75).length;$('#metrics').innerHTML=[["전체 학생",state.students.length,"예시 데이터"],["오늘 결석",abs,"최근 출결"],["과제 확인",miss,"미제출 포함"],["학습 상담",low,"평균 75점 미만"],["수정 기록",state.audit.length,"누적 기록"]].map(m=>`<div class="card metric"><span class="small">${m[0]}</span><b>${m[1]}</b><div class="small">${m[2]}</div></div>`).join('')}function renderChips(){const items=["전체",...grades,"주의"];$('#chips').innerHTML=items.map(g=>`<button class="chip ${filter==g?'active':''}" data-filter="${g}">${g}</button>`).join('')}function filtered(){return state.students.filter(s=>(filter=="전체"||s.grade==filter||(filter=="주의"&&action(s)!="정상 관리"))&&`${s.name} ${s.school} ${s.subject} ${s.book}`.includes(q))}function renderStudents(){const list=filtered();$('#countText').textContent=`${list.length}명 표시 · 전체 ${state.students.length}명`;$('#studentList').innerHTML=list.map(s=>`<button class="student ${s.id==selectedId?'active':''}" data-student="${s.id}"><div><b>${s.name}</b><div class="small">${s.grade} · ${s.school} · 영어 · ${s.days}</div></div><span class="badge ${badge(action(s))}">${action(s)}</span></button>`).join('');$('#quickDetail').innerHTML=student()?detailHtml(student(),true):''}function roster(label,list){return`<div class="row"><div><b>${label}</b><div class="small">${list.length}명</div></div><div class="name-list">${list.map(s=>`<button class="pill" data-roster="${s.id}">${s.name}</button>`).join('')||'<span class="small">등록 학생 없음</span>'}</div></div>`}function renderRosters(){$('#gradeList').innerHTML=grades.map(g=>roster(g,state.students.filter(s=>s.grade==g))).join('');$('#dayList').innerHTML=days.map(d=>roster(`${d}요일`,state.students.filter(s=>s.days.includes(d)))).join('')}
    function input(label,key,value,type='text'){return`<div class="field"><label>${label}</label><input data-edit="${key}" type="${type}" value="${String(value??'').replace(/"/g,'&quot;')}"></div>`}function detailHtml(s,compact=false){return`<div class="detail-title"><h2>${s.name}</h2><div class="small">${s.grade} · ${s.school} · 영어 · ${s.days}</div></div><div class="body grid"><div class="grid fields">${input('학교','school',s.school)}${input('학년','grade',s.grade)}${input('수강 요일','days',s.days)}${input('교재명','book',s.book)}${input('진도(단원명)','unit',s.unit)}${input('보강 날짜','makeupDate',s.makeupDate,'date')} ${input('학생 연락처','studentPhone',s.studentPhone)}${input('학부모 연락처','parentPhone',s.parentPhone)}</div>${compact?'':fullDetail(s)}</div>`}function fullDetail(s){return`<div class="grid two"><div class="panel"><div class="head"><h3>출결 관리 <span class="badge ${ar(s)>=85?'green':'yellow'}">${ar(s)}%</span></h3></div><div class="body rows">${s.attendance.map((a,i)=>`<div class="row"><div><b>${a.date}</b><div class="small">${a.lesson}</div></div><button class="badge ${badge(a.status)}" data-att="${i}">${a.status}</button></div>`).join('')}</div></div><div class="panel"><div class="head"><h3>영어 학습 관리 <span class="badge ${avg(s)>=80?'green':'yellow'}">평균 ${avg(s)}점</span></h3></div><div class="body grid fields">${input('단어','vocab',s.english.vocab,'number')}${input('리딩','reading',s.english.reading,'number')}${input('리스닝','listening',s.english.listening,'number')}${input('스피킹','speaking',s.english.speaking,'number')}</div></div></div><div class="panel"><div class="head"><h3>과제 관리 <span class="badge ${tr(s)>=70?'green':'red'}">${tr(s)}%</span></h3></div><div class="body rows">${s.assignments.map((a,i)=>`<div class="row"><div><b>${a.title}</b><div class="small">마감 ${a.due} · ${a.note}</div></div><button class="badge ${badge(a.status)}" data-task="${i}">${a.status}</button></div>`).join('')}</div></div><div class="panel"><div class="head"><h3>상담 및 알림</h3></div><div class="body"><textarea class="search" style="height:140px" id="memo">${s.memo||''}</textarea><div class="actions" style="margin-top:8px"><button class="primary" id="saveMemo">메모 저장</button></div></div></div><div class="panel"><div class="head"><h3>AI 학습보고서 생성</h3></div><div class="body grid"><div class="role-row">${Object.entries(reports).map(([k,v],i)=>`<button class="role-btn ${i==0?'active':''}" data-report="${k}">${v}</button>`).join('')}</div><button class="primary" id="genReport">보고서 생성</button><div class="field"><span class="label">생성 결과</span><div class="report-output" id="reportOut">보고서를 생성하면 여기에 표시됩니다.</div></div><div class="actions"><button class="ghost" id="saveImg">이미지 저장</button><button class="ghost" id="printPdf">PDF 저장</button><button class="ghost" id="shareBtn">카카오톡 공유</button></div></div></div>`}function renderDetail(){const s=student();$('#detailPanel').innerHTML=s?detailHtml(s):'<div class="body">학생 없음</div>'}function renderAudit(){$('#auditCount').textContent=`${state.audit.length}건`;$('#auditList').innerHTML=state.audit.map(a=>`<div class="audit"><div class="small">${new Date(a.at).toLocaleString('ko-KR')}</div><div><b>${a.actor}</b><div class="small">${a.student}</div></div><div><b>${a.field}</b><div class="small">${a.before||'빈 값'} → ${a.after||'빈 값'}</div></div></div>`).join('')||'<div class="small">아직 수정 기록이 없습니다.</div>'}
    function payload(s,type){return{academy,template:reports[type],name:s.name,grade:s.grade,school:s.school,days:s.days,book:s.book,unit:s.unit,attendanceRate:`${ar(s)}%`,assignmentRate:`${tr(s)}%`,vocab:s.english.vocab,reading:s.english.reading,listening:s.english.listening,speaking:s.english.speaking,average:avg(s),makeupDate:s.makeupDate||'미지정',memo:s.memo||''}}function fallback(s,type){const p=payload(s,type);if(type=='growth')return`${p.name} 성장 스토리\n\n지난달에는 영어 학습 루틴을 잡는 데 집중했습니다. 이번 달에는 ${p.book} 교재로 ${p.unit}을 학습하며 평균 ${p.average}점을 기록했습니다. 다음 목표는 단어 복습을 안정화하고 리딩 정확도를 높이는 것입니다.`;if(type=='weekly')return`${p.name} 주간 체크\n\n단어: ${p.vocab}점\n리딩: ${p.reading}점\n리스닝: ${p.listening}점\n스피킹: ${p.speaking}점\n\n이번 주는 ${p.unit} 중심으로 학습했습니다. 가정에서는 단어 소리 내어 읽기를 함께 확인해주세요.`;return`${p.name} 클래식 리포트\n\n점수 변화: 평균 ${p.average}점\n학습 내용: ${p.book} / ${p.unit}\n출석률: ${p.attendanceRate}\n과제 수행률: ${p.assignmentRate}\n선생님 코멘트: 현재 흐름을 유지하면서 부족한 영역을 보강하겠습니다.`}async function generateReport(){const s=student(),type=$('[data-report].active')?.dataset.report||'growth',out=$('#reportOut');out.textContent='보고서를 생성하고 있습니다...';try{const r=await fetch('/api/generate-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type,student:payload(s,type)})});if(!r.ok)throw Error();const d=await r.json();out.textContent=d.report||fallback(s,type)}catch{out.textContent=fallback(s,type)}audit(s,'AI 학습보고서 생성','',reports[type])}function reportText(){const t=$('#reportOut')?.textContent?.trim();return t&&!t.includes('생성하면')?t:fallback(student(),'growth')}function saveImage(){const s=student(),c=document.createElement('canvas'),x=c.getContext('2d');c.width=1200;c.height=1600;x.fillStyle='#fff';x.fillRect(0,0,1200,1600);x.fillStyle='#ff7417';x.fillRect(0,0,1200,18);x.fillStyle='#20242b';x.font='bold 42px Malgun Gothic';x.fillText('억매방 영어 학습보고서',70,90);x.font='28px Malgun Gothic';let y=155;reportText().split('\n').forEach(p=>{let line='';p.split(' ').forEach(w=>{let t=line?line+' '+w:w;if(x.measureText(t).width>1060&&line){x.fillText(line,70,y);y+=44;line=w}else line=t});x.fillText(line,70,y);y+=44});const a=document.createElement('a');a.download=`${s.name}-영어학습보고서.png`;a.href=c.toDataURL('image/png');a.click();audit(s,'보고서 이미지 저장','','PNG 저장')}function printPdf(){const s=student(),w=window.open('','_blank'),text=reportText().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');w.document.write(`<body style="font-family:Malgun Gothic;padding:32px;line-height:1.7"><h1>억매방 영어 학습보고서</h1>${text}</body>`);w.document.close();w.print();audit(s,'보고서 PDF 저장','','인쇄 창 열기')}async function share(){const s=student(),text=reportText();if(navigator.share)await navigator.share({title:`${s.name} 영어 학습보고서`,text});else{await navigator.clipboard.writeText(text);alert('보고서 내용을 복사했습니다. 카카오톡에 붙여넣어 전달할 수 있습니다.')}audit(s,'카카오톡 공유','','공유 실행')}
    $$('.role-btn[data-role]').forEach(b=>b.onclick=()=>{$$('.role-btn[data-role]').forEach(x=>x.classList.remove('active'));b.classList.add('active');selectedRole=b.dataset.role});$('#loginBtn').onclick=()=>{const pass=$('#password').value.trim();if((selectedRole=='director'&&pass=='1234')||(selectedRole=='teacher'&&pass=='1111')){user={role:selectedRole,label:selectedRole=='director'?'원장':'강사'};$('#login').style.display='none';$('#roleText').textContent=user.label+' 페이지';$('#roleMeta').textContent=new Date().toLocaleString('ko-KR')+' 접속';show(selectedRole=='director'?'dashboard':'students');audit(null,'로그인','',user.label+' 접속');render()}else $('#loginError').textContent='비밀번호를 확인해주세요.'};$('#logoutBtn').onclick=()=>{audit(null,'로그아웃',user?.label||'', '접속 종료');user=null;$('#login').style.display='grid'};$('#nav').onclick=e=>{const b=e.target.closest('[data-view]');if(b)show(b.dataset.view)};$('#chips').onclick=e=>{const b=e.target.closest('[data-filter]');if(b){filter=b.dataset.filter;render()}};$('#search').oninput=e=>{q=e.target.value.trim();renderStudents()};document.body.onclick=e=>{const st=e.target.closest('[data-student],[data-roster]');if(st){selectedId=st.dataset.student||st.dataset.roster;show('detail');render()}if(e.target.id=='openAddBtn')$('#addModal').classList.add('open');if(e.target.id=='closeAddBtn')$('#addModal').classList.remove('open');if(e.target.id=='addStudentBtn')addStudent();if(e.target.closest('[data-report]')){$$('[data-report]').forEach(b=>b.classList.remove('active'));e.target.closest('[data-report]').classList.add('active')}if(e.target.id=='genReport')generateReport();if(e.target.id=='saveImg')saveImage();if(e.target.id=='printPdf')printPdf();if(e.target.id=='shareBtn')share();if(e.target.id=='saveMemo'){const s=student(),before=s.memo;s.memo=$('#memo').value;audit(s,'상담 메모',before,s.memo);save()}if(e.target.dataset.att){const s=student(),a=s.attendance[e.target.dataset.att],before=a.status;a.status=statuses[(statuses.indexOf(a.status)+1)%3];audit(s,'출결 '+a.date,before,a.status);render()}if(e.target.dataset.task){const s=student(),t=s.assignments[e.target.dataset.task],before=t.status;t.status=tasks[(tasks.indexOf(t.status)+1)%3];audit(s,'과제 '+t.title,before,t.status);render()}};document.body.addEventListener('focusin',e=>{if(e.target.dataset.edit)e.target.dataset.before=e.target.value});document.body.addEventListener('change',e=>{if(!e.target.dataset.edit)return;const s=student(),key=e.target.dataset.edit,before=e.target.dataset.before||'';if(['vocab','reading','listening','speaking'].includes(key))s.english[key]=e.target.value;else s[key]=e.target.value;audit(s,key,before,e.target.value);render()});function addStudent(){const s={id:`S${Date.now()}`,name:$('#newName').value||'신규학생',grade:$('#newGrade').value,school:$('#newSchool').value||'미입력',subject:'영어',days:$('#newDays').value||'미정',book:$('#newBook').value||'미입력',unit:$('#newProgress').value||'미입력',studentPhone:$('#newStudentPhone').value||'',parentPhone:$('#newParentPhone').value||'',makeupDate:'',attendance:Array.from({length:8},(_,i)=>({date:`7/${String(i+1).padStart(2,'0')}`,lesson:'정규 영어',status:'출석'})),english:{vocab:0,reading:0,listening:0,speaking:0},assignments:[{title:'단어 암기',due:'7/08',status:'일부 완료',note:'20개'}],memo:$('#newMemo').value||''};state.students.unshift(s);selectedId=s.id;$('#addModal').classList.remove('open');audit(s,'학생 등록','',s.name);show('detail');render()}$('#exportBtn').onclick=()=>{const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='eokmaebang-data.json';a.click()};$('#newGrade').innerHTML=grades.map(g=>`<option>${g}</option>`).join('');render();
  </script>
